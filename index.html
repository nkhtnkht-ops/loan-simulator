<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>住宅ローン・資産形成シミュレーター</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#0f172a; --panel:#1e293b; --panel2:#243349; --line:#334155;
    --text:#e2e8f0; --muted:#94a3b8; --accent:#38bdf8;
    --good:#22c55e; --bad:#ef4444; --warn:#f59e0b;
    --c1:#2563eb; --c2:#dc2626; --c3:#16a34a; --c4:#d97706;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
    font-size:14px; line-height:1.5;
  }
  header{
    padding:16px 20px; background:linear-gradient(135deg,#1e293b,#0f172a);
    border-bottom:1px solid var(--line);
  }
  header h1{margin:0; font-size:18px; font-weight:700;}
  header p{margin:4px 0 0; color:var(--muted); font-size:12px;}
  .wrap{max-width:1280px; margin:0 auto; padding:16px;}
  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:16px; margin-bottom:16px;
  }
  h2{font-size:14px; margin:0 0 12px; color:var(--accent); letter-spacing:.04em;}

  /* tabs */
  .tabs{display:flex; flex-wrap:wrap; gap:8px; align-items:center;}
  .tab{
    display:flex; align-items:center; gap:8px; padding:8px 12px; border-radius:8px;
    background:var(--panel2); border:1px solid var(--line); cursor:pointer; font-size:13px;
  }
  .tab.active{outline:2px solid var(--accent);}
  .tab .dot{width:10px; height:10px; border-radius:50%;}
  .tab input{background:transparent; border:none; color:var(--text); font-size:13px; width:110px; outline:none;}
  .tab-btns{display:flex; gap:6px; margin-left:auto; flex-wrap:wrap;}
  button.btn{
    background:var(--panel2); color:var(--text); border:1px solid var(--line);
    padding:8px 12px; border-radius:8px; cursor:pointer; font-size:13px;
  }
  button.btn:hover{border-color:var(--accent);}
  button.btn.del{border-color:#7f1d1d; color:#fca5a5;}
  button.mini{padding:4px 8px; font-size:12px;}

  /* summary cards */
  .summary{display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:10px;}
  .scard{background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:12px; text-align:center;}
  .scard .lbl{font-size:11px; color:var(--muted);}
  .scard .val{font-size:18px; font-weight:700; margin-top:4px;}
  .scard .val small{font-size:11px; color:var(--muted); font-weight:400;}
  .scard.result{background:#0c2a4a; border-color:var(--accent);}
  .scard.alert{background:#3b0d0d; border-color:var(--bad);}
  .scard.ok{background:#0c2e1a; border-color:var(--good);}
  .warnbar{margin-top:10px; padding:8px 12px; border-radius:8px; font-size:13px; display:none;}
  .warnbar.show{display:block;}
  .warnbar.bad{background:#3b0d0d; color:#fca5a5; border:1px solid var(--bad);}
  .warnbar.ok{background:#0c2e1a; color:#86efac; border:1px solid var(--good);}

  /* inputs */
  details.inputs summary{cursor:pointer; font-size:14px; color:var(--accent); font-weight:600; list-style:none;}
  details.inputs summary::-webkit-details-marker{display:none;}
  details.inputs summary::before{content:"▸ "; }
  details.inputs[open] summary::before{content:"▾ "; }
  .grp{margin-top:14px;}
  .grp h3{font-size:12px; color:var(--muted); margin:0 0 8px; text-transform:uppercase; letter-spacing:.05em;}
  .fields{display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:10px;}
  .field{display:flex; flex-direction:column; gap:3px;}
  .field label{font-size:11px; color:var(--muted);}
  .field .inrow{display:flex; align-items:center; gap:4px;}
  .field input{
    width:100%; background:var(--bg); color:var(--text); border:1px solid var(--line);
    border-radius:6px; padding:7px 8px; font-size:13px;
  }
  .field .unit{font-size:11px; color:var(--muted); white-space:nowrap;}
  .presets{display:flex; gap:8px; flex-wrap:wrap; margin-top:6px;}

  /* rate table */
  .ratewrap{max-height:240px; overflow:auto; border:1px solid var(--line); border-radius:8px;}
  table.rate{width:100%; border-collapse:collapse; font-size:12px;}
  table.rate th,table.rate td{padding:5px 8px; border-bottom:1px solid var(--line); text-align:center;}
  table.rate th{position:sticky; top:0; background:var(--panel2); z-index:1;}
  table.rate input{width:70px; background:var(--bg); color:var(--text); border:1px solid var(--line); border-radius:5px; padding:4px; text-align:right;}

  /* charts */
  .charts{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  .chartbox{background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:10px;}
  .chartbox h3{font-size:12px; margin:0 0 8px; color:var(--muted);}
  .chartbox canvas{width:100%!important; height:260px!important;}

  /* data table */
  .tablewrap{overflow:auto; border:1px solid var(--line); border-radius:8px;}
  table.data{width:100%; border-collapse:collapse; font-size:12px; white-space:nowrap;}
  table.data th,table.data td{padding:6px 9px; border-bottom:1px solid var(--line); text-align:right;}
  table.data th{position:sticky; top:0; background:var(--panel2); z-index:1; font-weight:600;}
  table.data td:first-child,table.data th:first-child{text-align:center;}
  table.data tr:hover td{background:#27374d;}
  table.data .milestone td{background:#0c2a4a;}
  .legend{display:flex; gap:14px; flex-wrap:wrap; margin-bottom:10px; font-size:12px;}
  .legend span{display:inline-flex; align-items:center; gap:5px;}
  .legend i{width:14px; height:4px; border-radius:2px; display:inline-block;}
  .pos{color:var(--good);} .neg{color:var(--bad);}

  @media(max-width:760px){
    .charts{grid-template-columns:1fr;}
    .tab-btns{width:100%; margin-left:0;}
  }
</style>
</head>
<body>
<header>
  <h1>🏠 住宅ローン・資産形成シミュレーター</h1>
</header>

<div class="wrap">

  <!-- scenario tabs -->
  <div class="card">
    <div class="tabs" id="tabs"></div>
    <div class="tab-btns" style="margin-top:12px;">
      <button class="btn" onclick="addScenario()">＋ 新規シナリオ</button>
      <button class="btn" onclick="duplicateScenario()">⧉ 複製</button>
      <button class="btn del" onclick="deleteScenario()">🗑 削除</button>
    </div>
  </div>

  <!-- summary -->
  <div class="card">
    <h2>月次キャッシュフロー（<span id="sumName"></span>・初年度2027年）</h2>
    <div class="summary" id="summary"></div>
    <div class="warnbar" id="warn"></div>
  </div>

  <!-- inputs -->
  <div class="card">
    <details class="inputs" open>
      <summary>入力パネル</summary>
      <div id="inputPanel"></div>
      <div class="grp">
        <h3>金利パスのプリセット</h3>
        <div class="presets">
          <button class="btn mini" onclick="applyPreset('opt')">楽観 1.0%</button>
          <button class="btn mini" onclick="applyPreset('base')">基本 1.2%→1.5%</button>
          <button class="btn mini" onclick="applyPreset('stress')">ストレス 1.5%→2.0%</button>
          <button class="btn mini" onclick="applyPreset('stress2')">激ストレス 2.0%→3.5%</button>
          <button class="btn mini" onclick="applyPreset('cycle')">変動 1.2%⇄2.0%</button>
        </div>
      </div>
      <div class="grp">
        <h3>金利パス（年ごと・%）</h3>
        <div class="ratewrap"><table class="rate" id="rateTable"></table></div>
      </div>
    </details>
  </div>

  <!-- charts -->
  <div class="card">
    <h2>グラフ比較（全シナリオ重ね描き・最大4）</h2>
    <div class="legend" id="legend"></div>
    <div class="charts">
      <div class="chartbox"><h3>純資産推移</h3><canvas id="chNet"></canvas></div>
      <div class="chartbox"><h3>投資残高＋現金</h3><canvas id="chAsset"></canvas></div>
      <div class="chartbox"><h3>ローン残高</h3><canvas id="chLoan"></canvas></div>
      <div class="chartbox"><h3>年間収支</h3><canvas id="chFlow"></canvas></div>
    </div>
  </div>

  <!-- table -->
  <div class="card">
    <h2>年次テーブル（<span id="tblName"></span>）</h2>
    <div class="tablewrap"><table class="data" id="dataTable"></table></div>
  </div>

</div>

<script>
/* ============ schema ============ */
const SCHEMA = [
  {grp:'ローン', items:[
    {k:'loanAmount', l:'借入額', u:'万円', step:10},
    {k:'termYears',  l:'返済期間', u:'年', step:1},
    {k:'startAge',   l:'開始年齢(2027年)', u:'歳', step:1},
  ]},
  {grp:'収入（手取り）', items:[
    {k:'incomeMonthly', l:'手取り月収', u:'万円/月', step:1},
    {k:'bonusAnnual',   l:'賞与(手取り年額・59歳まで)', u:'万円/年', step:10},
    {k:'raise',         l:'昇給率(59歳まで)', u:'%', step:0.1},
    {k:'income60',      l:'60〜64歳 手取り年収', u:'万円', step:10},
    {k:'income65',      l:'65歳〜 手取り年収', u:'万円', step:1},
  ]},
  {grp:'支出', items:[
    {k:'livingMonthly', l:'生活費', u:'万円/月', step:0.5},
    {k:'inflation',     l:'生活費インフレ率', u:'%', step:0.1},
    {k:'mgmtFee',       l:'管理費+修繕+ネット', u:'円/月', step:100},
    {k:'parking',       l:'駐車場', u:'円/月', step:100},
    {k:'housingRise',   l:'住居関連費の上昇率', u:'%', step:0.1},
  ]},
  {grp:'資産運用', items:[
    {k:'investMonthly', l:'積立投資額(59歳まで)', u:'万円/月', step:0.5},
    {k:'invReturn',     l:'想定利回り', u:'%', step:0.1},
    {k:'invInit',       l:'投資残高 初期値', u:'万円', step:10},
    {k:'cashInit',      l:'現金 初期値', u:'万円', step:10},
    {k:'dcInit',        l:'企業型DC 残高', u:'万円', step:10},
    {k:'dcMonthly',     l:'DC拠出(天引き外)', u:'万円/月', step:0.5},
    {k:'reInit',        l:'不動産評価 初期値', u:'万円', step:10},
    {k:'reDeprec',      l:'不動産 減価率', u:'%', step:0.1},
    {k:'reFloor',       l:'不動産 評価下限', u:'万円', step:10},
  ]},
];

const START_YEAR=2027, YEARS=36; // 2027..2062

function defaultRatePath(){
  const rp={};
  for(let y=START_YEAR; y<START_YEAR+YEARS; y++){
    rp[y] = (y===2027)?1.00 : (y===2028)?1.00 : 1.00;
  }
  return rp;
}

function defaultInputs(){
  return {
    loanAmount:4000, termYears:35, startAge:40,
    incomeMonthly:40, bonusAnnual:120, raise:1.5, income60:300, income65:200,
    livingMonthly:15, inflation:2.0, mgmtFee:20000, parking:10000, housingRise:1.5,
    investMonthly:5, invReturn:5.0, invInit:500, cashInit:200,
    dcInit:300, dcMonthly:2,
    reInit:4000, reDeprec:2.0, reFloor:1500,
    ratePath:defaultRatePath(),
  };
}

const COLORS=['#2563eb','#dc2626','#16a34a','#d97706'];

/* ============ state ============ */
let state = load();
function load(){
  try{
    const raw = localStorage.getItem('loanSimV1');
    if(raw){ const s=JSON.parse(raw); if(s.scenarios && s.scenarios.length) return s; }
  }catch(e){}
  return { scenarios:[ {id:uid(), name:'基本シナリオ', inputs:defaultInputs()} ], activeId:null };
}
function save(){ localStorage.setItem('loanSimV1', JSON.stringify(state)); }
function uid(){ return 's'+Math.floor(performance.now()*1000).toString(36)+Math.floor(Math.random()*1e6).toString(36); }
function active(){ return state.scenarios.find(s=>s.id===state.activeId) || state.scenarios[0]; }
if(!state.activeId) state.activeId = state.scenarios[0].id;

/* ============ engine ============ */
function pmtMonthly(annualPct, months, principalYen){
  const i = annualPct/100/12;
  if(i===0) return principalYen/months;
  return principalYen * i / (1 - Math.pow(1+i, -months));
}
function getRate(inp, year){
  if(inp.ratePath[year]!=null) return +inp.ratePath[year];
  // fallback: last defined
  let last=1.5;
  for(let y=START_YEAR;y<=year;y++) if(inp.ratePath[y]!=null) last=+inp.ratePath[y];
  return last;
}

function compute(inp){
  const termMonths = inp.termYears*12;
  let loan = inp.loanAmount*10000;
  let cash = inp.cashInit*10000;
  let inv  = inp.invInit*10000;
  let dc   = inp.dcInit*10000;
  let pmt=0, prevRate=null;
  const rows=[];
  for(let k=0;k<YEARS;k++){
    const year=START_YEAR+k, age=inp.startAge+k;
    const rate=getRate(inp,year);
    const remMonths = termMonths - k*12;

    // --- repayment (元利均等 + 再アモチ) ---
    let repay=0;
    if(loan>1){
      const payoff = loan*(1+rate/100);
      if(remMonths<=12){
        repay=payoff; loan=0;                       // 残期間1年以下 → 一括清算
      }else{
        if(prevRate===null || rate!==prevRate){     // 初年度 or 金利変更年は再計算
          pmt = pmtMonthly(rate, remMonths, loan);
        }
        const sched = pmt*12;
        if(sched>=payoff){ repay=payoff; loan=0; }
        else { repay=sched; loan=payoff-sched; }
      }
    } else { loan=0; }
    prevRate=rate;

    // --- income ---
    let income;
    if(age<=59)      income = (inp.incomeMonthly*12 + (inp.bonusAnnual||0))*10000*Math.pow(1+inp.raise/100, age-inp.startAge);
    else if(age<=64) income = inp.income60*10000;
    else             income = inp.income65*10000;

    // --- expenses ---
    const living  = inp.livingMonthly*12*10000*Math.pow(1+inp.inflation/100, k);
    const housing = (inp.mgmtFee+inp.parking)*12*Math.pow(1+inp.housingRise/100, k);
    const invContrib = age<=59 ? inp.investMonthly*12*10000 : 0;
    const dcContrib  = age<=59 ? inp.dcMonthly*12*10000 : 0;

    // --- cash flow ---
    const flow = income - repay - living - housing - invContrib;
    let shortfall=0;
    const cashTmp = cash + flow;
    if(cashTmp>=0){ cash=cashTmp; } else { shortfall=-cashTmp; cash=0; }

    // --- DC ---
    let lump=0;
    if(age<=59)     dc = dc*(1+inp.invReturn/100) + dcContrib; // 59歳まで成長＋拠出
    else if(age===60){ lump = dc; dc=0; }                      // 60歳で残高を一括受取し投資へ
    else            dc = 0;

    // --- investment ---
    inv = inv*(1+inp.invReturn/100) + invContrib + lump - shortfall;
    if(inv<0) inv=0;

    // --- real estate ---
    const re = Math.max(inp.reFloor*10000, inp.reInit*10000*Math.pow(1-inp.reDeprec/100, k));

    const net = cash + inv + dc + re - loan;
    rows.push({year,age,rate,repay,loan,flow,cash,inv,dc,re,net});
  }
  return rows;
}

/* ============ format ============ */
const man = yen => Math.round(yen/10000);
const fmt = yen => man(yen).toLocaleString('ja-JP');
const fmtSigned = yen => (yen>=0?'+':'') + man(yen).toLocaleString('ja-JP');

/* ============ render: tabs ============ */
function renderTabs(){
  const el=document.getElementById('tabs'); el.innerHTML='';
  state.scenarios.forEach((s,i)=>{
    const t=document.createElement('div');
    t.className='tab'+(s.id===state.activeId?' active':'');
    t.onclick=(e)=>{ if(e.target.tagName!=='INPUT'){ state.activeId=s.id; save(); renderAll(); } };
    const dot=document.createElement('span'); dot.className='dot'; dot.style.background=COLORS[i%4];
    const inp=document.createElement('input'); inp.value=s.name;
    inp.onchange=()=>{ s.name=inp.value; save(); renderSummary(); renderTable(); renderLegend(); };
    t.appendChild(dot); t.appendChild(inp);
    el.appendChild(t);
  });
}
function addScenario(){
  if(state.scenarios.length>=4){ alert('シナリオは最大4つまでです'); return; }
  state.scenarios.push({id:uid(), name:'シナリオ'+(state.scenarios.length+1), inputs:defaultInputs()});
  state.activeId=state.scenarios[state.scenarios.length-1].id; save(); renderAll();
}
function duplicateScenario(){
  if(state.scenarios.length>=4){ alert('シナリオは最大4つまでです'); return; }
  const a=active(); const copy={id:uid(), name:a.name+' 複製', inputs:JSON.parse(JSON.stringify(a.inputs))};
  state.scenarios.push(copy); state.activeId=copy.id; save(); renderAll();
}
function deleteScenario(){
  if(state.scenarios.length<=1){ alert('最後の1つは削除できません'); return; }
  if(!confirm('「'+active().name+'」を削除しますか？')) return;
  state.scenarios=state.scenarios.filter(s=>s.id!==state.activeId);
  state.activeId=state.scenarios[0].id; save(); renderAll();
}

/* ============ render: inputs ============ */
function renderInputs(){
  const a=active(); const host=document.getElementById('inputPanel'); host.innerHTML='';
  SCHEMA.forEach(g=>{
    const wrap=document.createElement('div'); wrap.className='grp';
    wrap.innerHTML='<h3>'+g.grp+'</h3>';
    const fields=document.createElement('div'); fields.className='fields';
    g.items.forEach(it=>{
      const f=document.createElement('div'); f.className='field';
      f.innerHTML='<label>'+it.l+'</label>';
      const row=document.createElement('div'); row.className='inrow';
      const inp=document.createElement('input');
      inp.type='number'; inp.step=it.step; inp.value=a.inputs[it.k];
      inp.onchange=()=>{ a.inputs[it.k]=+inp.value; save(); renderSummary(); renderCharts(); renderTable(); };
      const u=document.createElement('span'); u.className='unit'; u.textContent=it.u;
      row.appendChild(inp); row.appendChild(u); f.appendChild(row); fields.appendChild(f);
    });
    wrap.appendChild(fields); host.appendChild(wrap);
  });
  renderRateTable();
}
function renderRateTable(){
  const a=active(); const t=document.getElementById('rateTable');
  let html='<tr><th>年</th><th>年齢</th><th>金利(%)</th></tr>';
  for(let k=0;k<a.inputs.termYears && k<YEARS;k++){
    const y=START_YEAR+k, age=a.inputs.startAge+k;
    html+='<tr><td>'+y+'</td><td>'+age+'</td><td><input type="number" step="0.05" value="'+getRate(a.inputs,y)+'" data-y="'+y+'"></td></tr>';
  }
  t.innerHTML=html;
  t.querySelectorAll('input').forEach(inp=>{
    inp.onchange=()=>{ active().inputs.ratePath[+inp.dataset.y]=+inp.value; save(); renderSummary(); renderCharts(); renderTable(); };
  });
}
function applyPreset(kind){
  const a=active(); const rp={};
  for(let y=START_YEAR;y<START_YEAR+YEARS;y++){
    if(kind==='opt') rp[y]=1.0;
    else if(kind==='base') rp[y]=(y===2027)?1.20:(y===2028)?1.45:1.50;
    else if(kind==='stress') rp[y]=(y===2027)?1.50:(y===2028)?1.75:2.00;
    else if(kind==='stress2') rp[y]=Math.min(3.50, 2.00+0.50*(y-2027)); // 2.0%から毎年+0.5%、3.5%で頭打ち
    else if(kind==='cycle'){ // 景気サイクル：1.2%〜2.0%を約8年周期で上下
      const v = 1.60 + 0.40*Math.sin(2*Math.PI*(y-2027)/8);
      rp[y] = +(Math.round(v/0.05)*0.05).toFixed(2);
    }
  }
  a.inputs.ratePath=rp; save(); renderRateTable(); renderSummary(); renderCharts(); renderTable();
}

/* ============ render: summary ============ */
function renderSummary(){
  const a=active();
  document.getElementById('sumName').textContent=a.name;
  const inp=a.inputs;
  const rate0=getRate(inp,2027);
  const pmt = pmtMonthly(rate0, inp.termYears*12, inp.loanAmount*10000); // yen/month
  const incomeM = inp.incomeMonthly*10000;
  const mgmtM   = inp.mgmtFee+inp.parking;
  const livingM = inp.livingMonthly*10000;
  const surplus = incomeM - pmt - mgmtM - livingM;
  const investM = inp.investMonthly*10000;
  const over = investM>surplus;

  const cards=[
    ['手取り', '+'+fmt(incomeM), '万/月'],
    ['ローン返済', '−'+Math.round(pmt).toLocaleString('ja-JP'), '円/月'],
    ['管理費等', '−'+fmt(mgmtM), '万/月'],
    ['生活費', '−'+fmt(livingM), '万/月'],
  ];
  let html='';
  cards.forEach(c=>{ html+='<div class="scard"><div class="lbl">'+c[0]+'</div><div class="val">'+c[1]+' <small>'+c[2]+'</small></div></div>'; });
  html+='<div class="scard result"><div class="lbl">投資可能余剰</div><div class="val">'+fmtSigned(surplus)+' <small>万/月</small></div></div>';
  html+='<div class="scard '+(over?'alert':'ok')+'"><div class="lbl">設定 積立額</div><div class="val">'+fmt(investM)+' <small>万/月</small></div></div>';
  document.getElementById('summary').innerHTML=html;

  const w=document.getElementById('warn');
  if(over){
    w.className='warnbar show bad';
    w.textContent='⚠ 積立額（'+fmt(investM)+'万）が投資可能余剰（'+fmt(surplus)+'万）を超えています。現金が不足し投資取り崩しが発生します。';
  }else{
    w.className='warnbar show ok';
    w.textContent='✓ 積立後の月次余剰：'+fmt(surplus-investM)+'万（余剰内に収まっています）';
  }
}

/* ============ render: charts ============ */
let charts={};
function buildDatasets(key){
  return state.scenarios.map((s,i)=>{
    const rows=compute(s.inputs);
    return {
      label:s.name,
      data:rows.map(r=>man(r[key])),
      borderColor:COLORS[i%4],
      backgroundColor:COLORS[i%4],
      borderWidth:2, pointRadius:0, tension:.15,
    };
  });
}
function makeChart(id,key,curId){
  const labels=compute(active().inputs).map(r=>r.year);
  const cfg={
    type:'line',
    data:{labels, datasets:buildDatasets(key)},
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:c=>c.dataset.label+': '+c.parsed.y.toLocaleString('ja-JP')+'万'}},
      },
      scales:{
        x:{ticks:{color:'#94a3b8',maxTicksLimit:10},grid:{color:'#1e293b'}},
        y:{ticks:{color:'#94a3b8',callback:v=>v.toLocaleString('ja-JP')},grid:{color:'#1e293b'}},
      },
    },
  };
  if(charts[curId]){ charts[curId].data=cfg.data; charts[curId].update(); }
  else charts[curId]=new Chart(document.getElementById(id),cfg);
}
function renderCharts(){
  makeChart('chNet','net','net');
  makeChart('chAsset','inv','asset');   // 投資残高（+現金は別系列にせず投資主体、下のassetで合算表示）
  makeChart('chLoan','loan','loan');
  makeChart('chFlow','flow','flow');
  // asset chart: 投資+現金 合算で上書き
  const ds=state.scenarios.map((s,i)=>{
    const rows=compute(s.inputs);
    return {label:s.name, data:rows.map(r=>man(r.inv+r.cash)),
      borderColor:COLORS[i%4], backgroundColor:COLORS[i%4], borderWidth:2, pointRadius:0, tension:.15};
  });
  charts['asset'].data.datasets=ds; charts['asset'].update();
}
function renderLegend(){
  const el=document.getElementById('legend'); el.innerHTML='';
  state.scenarios.forEach((s,i)=>{
    el.innerHTML+='<span><i style="background:'+COLORS[i%4]+'"></i>'+s.name+'</span>';
  });
}

/* ============ render: table ============ */
function renderTable(){
  const a=active();
  document.getElementById('tblName').textContent=a.name;
  const rows=compute(a.inputs);
  const heads=['年','年齢','金利','返済額','ローン残高','年間収支','現金','投資','DC','不動産','純資産'];
  let html='<tr>'; heads.forEach(h=>html+='<th>'+h+'</th>'); html+='</tr>';
  rows.forEach(r=>{
    const mile=(r.year===2027||r.year===2062||r.age===60||r.age===65);
    html+='<tr class="'+(mile?'milestone':'')+'">'+
      '<td>'+r.year+'</td>'+
      '<td>'+r.age+'</td>'+
      '<td>'+r.rate.toFixed(2)+'%</td>'+
      '<td>'+fmt(r.repay)+'</td>'+
      '<td>'+fmt(r.loan)+'</td>'+
      '<td class="'+(r.flow>=0?'pos':'neg')+'">'+fmtSigned(r.flow)+'</td>'+
      '<td>'+fmt(r.cash)+'</td>'+
      '<td>'+fmt(r.inv)+'</td>'+
      '<td>'+fmt(r.dc)+'</td>'+
      '<td>'+fmt(r.re)+'</td>'+
      '<td><b>'+fmt(r.net)+'</b></td>'+
      '</tr>';
  });
  document.getElementById('dataTable').innerHTML=html;
}

/* ============ render all ============ */
function renderAll(){
  renderTabs(); renderInputs(); renderSummary(); renderLegend(); renderCharts(); renderTable();
}
renderAll();
